<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:; connect-src https://raw.githubusercontent.com https://*.freesound.org https://strudel.cc https://felixroos.github.io 'self'; media-src blob: data: 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' blob: data:">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
      #strudel-root {
        width: 100%;
        height: 100%;
        display: flex;
        flex-direction: column;
      }
      #strudel-root .cm-editor {
        flex: 1;
        min-height: 0;
        overflow: hidden;
        height: 100%;
      }
      #strudel-root .cm-editor .cm-scroller {
        overflow: auto !important;
      }
      .loading {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #999;
        font-size: 13px;
        font-family: monospace;
      }
      .error {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: #f44;
        font-size: 13px;
        font-family: monospace;
      }
    </style>
    <title>Strudel Sandbox</title>
  </head>
  <body>
    <div id="strudel-root"><div class="loading">Loading Strudel...</div></div>
    <script type="module" src="/src/strudel-sandbox.ts"></script>
  </body>
</html>
